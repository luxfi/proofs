\* MC_Quasar.cfg -- TLC / Apalache model checking configuration
\*
\* Run with TLC:
\*   java -jar tla2tools.jar -config MC_Quasar.cfg MC_Quasar
\*
\* Run with Apalache:
\*   apalache-mc check --config=MC_Quasar.cfg MC_Quasar.tla

\* --------------------------------------------------------------------------
\* SPECIFICATION
\* --------------------------------------------------------------------------

SPECIFICATION Spec

\* --------------------------------------------------------------------------
\* CONSTANTS
\* --------------------------------------------------------------------------

CONSTANTS
    N          = MC_N
    F          = MC_F
    QuorumNum  = MC_QuorumNum
    QuorumDen  = MC_QuorumDen
    EnableBLS  = MC_EnableBLS
    EnableRT   = MC_EnableRT
    EnableMLDSA = MC_EnableMLDSA
    Values     = MC_Values

\* --------------------------------------------------------------------------
\* STATE CONSTRAINT (bounds state space for tractable checking)
\* --------------------------------------------------------------------------

CONSTRAINT StateConstraint

\* --------------------------------------------------------------------------
\* INVARIANTS (checked at every reachable state)
\* --------------------------------------------------------------------------

INVARIANT MC_TypeOK
INVARIANT MC_Safety
INVARIANT MC_QuantumUnforgeability
INVARIANT MC_ByzAloneCannotReachQuorum
INVARIANT MC_HonestSignsAtMostOne
INVARIANT MC_HonestLayerConsistency

\* --------------------------------------------------------------------------
\* TEMPORAL PROPERTIES
\* --------------------------------------------------------------------------

\* Finalized decisions never change (action property)
PROPERTY MC_FinalizedStable

\* Liveness: will produce counterexample under nondeterminism (expected).
\* Uncomment to verify counterexample exists:
\*
\* PROPERTY MC_Liveness

\* --------------------------------------------------------------------------
\* SYMMETRY (reduces state space when Values has 2+ elements)
\* --------------------------------------------------------------------------

\* SYMMETRY MC_Symmetry
