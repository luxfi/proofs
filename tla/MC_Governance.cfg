\* MC_Governance.cfg -- TLC model checking configuration for Governance
\*
\* Run: java -jar tla2tools.jar -config MC_Governance.cfg MC_Governance

SPECIFICATION Spec

CONSTANTS
    Proposals      = MC_Proposals
    Addresses      = MC_Addresses
    MaxWeight      = MC_MaxWeight
    Quorum         = MC_Quorum
    VotingDuration = MC_VotingDuration
    MaxRound       = MC_MaxRound

CONSTRAINT StateConstraint

INVARIANT MC_TypeOK
INVARIANT MC_NoExecuteWithoutQuorum
INVARIANT MC_NoDoubleVoting
INVARIANT MC_VoteWeightBound
INVARIANT MC_VoteTotalBound
INVARIANT MC_StateTransitionValidity

PROPERTY MC_NoVoteAfterTally
